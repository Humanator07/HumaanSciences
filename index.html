<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2048 — Humaan Sciences Lab</title>
<style>
  :root{
    --bg:#EFEBE2; --board:#d9d2c0; --cell:#e8e2d4; --ink:#1E2B23;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:'Inter',-apple-system,sans-serif;display:flex;flex-direction:column;
    align-items:center;touch-action:none;-webkit-user-select:none;user-select:none;}
  header{width:100%;display:flex;justify-content:space-between;align-items:center;
    padding:16px 5vw;box-sizing:border-box;}
  a{color:#46524A;text-decoration:none;font-size:0.85rem;}
  .scoreBox{background:#3F5A4D;color:#fff;padding:8px 16px;border-radius:4px;text-align:center;}
  .scoreBox .lbl{font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;opacity:0.8;}
  .scoreBox .val{font-size:1.2rem;font-weight:700;}

  h1{font-size:1.4rem;margin:4px 0 14px;}

  #board{
    position:relative;width:min(92vw,420px);height:min(92vw,420px);
    background:var(--board);border-radius:8px;padding:8px;
    display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
    gap:8px;box-sizing:border-box;
  }
  .bgcell{background:var(--cell);border-radius:5px;}
  .tile{
    position:absolute;display:flex;align-items:center;justify-content:center;
    border-radius:5px;font-weight:700;transition:left 0.1s ease, top 0.1s ease, transform 0.1s ease;
    font-size:1.5rem;
  }
  .msg{margin-top:18px;font-size:0.85rem;color:#46524A;text-align:center;}
  #restart{
    margin-top:14px;background:#3F5A4D;color:#fff;border:none;padding:10px 24px;
    border-radius:4px;font-family:inherit;font-size:0.85rem;cursor:pointer;
  }
  #overlay{
    position:fixed;inset:0;background:rgba(30,43,35,0.7);display:none;
    align-items:center;justify-content:center;flex-direction:column;color:#fff;z-index:10;
  }
  #overlay.show{display:flex;}
  #overlay h2{font-size:1.6rem;margin-bottom:8px;}
</style>
</head>
<body>

<header>
  <a href="../../games.html">← Back to Lab</a>
  <div class="scoreBox"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
</header>

<h1>2048</h1>
<div id="board"></div>
<div class="msg">Swipe or use arrow keys / WASD to merge tiles. Reach 2048 to win.</div>
<button id="restart">Restart</button>

<div id="overlay">
  <h2 id="overTitle">Game Over</h2>
  <button id="overRestart">Try Again</button>
</div>

<script>
const SIZE = 4;
let grid, score = 0;
const board = document.getElementById('board');
const scoreEl = document.getElementById('score');
const overlay = document.getElementById('overlay');

const COLORS = {
  2:'#eee4da', 4:'#ede0c8', 8:'#f2b179', 16:'#f59563', 32:'#f67c5f',
  64:'#f65e3b', 128:'#edcf72', 256:'#edcc61', 512:'#edc850', 1024:'#edc53f', 2048:'#edc22e'
};
const TEXT_DARK = new Set([2,4]);

function newGrid(){
  grid = Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score = 0;
  scoreEl.textContent = 0;
  overlay.classList.remove('show');
  addRandom(); addRandom();
  render();
}

function addRandom(){
  const empties = [];
  for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) if (grid[r][c]===0) empties.push([r,c]);
  if (!empties.length) return false;
  const [r,c] = empties[Math.floor(Math.random()*empties.length)];
  grid[r][c] = Math.random()<0.9 ? 2 : 4;
  return true;
}

function cellSize(){
  const rect = board.getBoundingClientRect();
  return (rect.width - 8*2 - 8*3)/4; // padding 8, gap 8
}

function render(){
  board.querySelectorAll('.bgcell,.tile').forEach(e=>e.remove());
  for (let i=0;i<16;i++){
    const bg = document.createElement('div');
    bg.className='bgcell';
    board.appendChild(bg);
  }
  const cs = cellSize();
  const gap = 8;
  for (let r=0;r<SIZE;r++){
    for (let c=0;c<SIZE;c++){
      const v = grid[r][c];
      if (!v) continue;
      const t = document.createElement('div');
      t.className='tile';
      t.style.width = cs+'px';
      t.style.height = cs+'px';
      t.style.left = (8 + c*(cs+gap))+'px';
      t.style.top = (8 + r*(cs+gap))+'px';
      t.style.background = COLORS[v] || '#3c3a32';
      t.style.color = TEXT_DARK.has(v) ? '#5d5347' : '#fff';
      t.style.fontSize = v>=1024 ? '1.1rem' : '1.5rem';
      t.textContent = v;
      board.appendChild(t);
    }
  }
  scoreEl.textContent = score;
}

function slideRow(row){
  const filtered = row.filter(v=>v!==0);
  const result = [];
  let merged = false;
  for (let i=0;i<filtered.length;i++){
    if (i<filtered.length-1 && filtered[i]===filtered[i+1]){
      const val = filtered[i]*2;
      result.push(val);
      score += val;
      i++;
      merged = true;
    } else {
      result.push(filtered[i]);
    }
  }
  while (result.length<SIZE) result.push(0);
  return {row:result, moved: JSON.stringify(row)!==JSON.stringify(result)};
}

function rotateGrid(g){
  const n = g.length;
  const res = Array.from({length:n},()=>Array(n).fill(0));
  for (let r=0;r<n;r++) for (let c=0;c<n;c++) res[c][n-1-r] = g[r][c];
  return res;
}

function move(dir){
  // dir: 0=left,1=up,2=right,3=down
  let g = grid.map(row=>row.slice());
  for (let i=0;i<dir;i++) g = rotateGrid(g);
  let anyMoved = false;
  for (let r=0;r<SIZE;r++){
    const {row, moved} = slideRow(g[r]);
    g[r] = row;
    if (moved) anyMoved = true;
  }
  for (let i=0;i<(4-dir)%4;i++) g = rotateGrid(g);
  if (anyMoved){
    grid = g;
    addRandom();
    render();
    checkEnd();
  }
}

function checkEnd(){
  for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) if (grid[r][c]>=2048){
    showOverlay('You reached 2048!');
    return;
  }
  // check moves available
  for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++){
    if (grid[r][c]===0) return;
    if (c<SIZE-1 && grid[r][c]===grid[r][c+1]) return;
    if (r<SIZE-1 && grid[r][c]===grid[r+1][c]) return;
  }
  showOverlay('No more moves');
}

function showOverlay(text){
  document.getElementById('overTitle').textContent = text;
  overlay.classList.add('show');
}

window.addEventListener('keydown', e=>{
  if (e.shiftKey && e.code === 'KeyQ'){ window.location.replace('../../index.html'); return; }
  const map = {ArrowLeft:0,KeyA:0,ArrowUp:1,KeyW:1,ArrowRight:2,KeyD:2,ArrowDown:3,KeyS:3};
  if (map[e.code]!==undefined){ e.preventDefault(); move(map[e.code]); }
});

let touchStartX=0, touchStartY=0;
board.addEventListener('touchstart', e=>{
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
}, {passive:true});
board.addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.max(Math.abs(dx),Math.abs(dy)) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)){
    move(dx>0?2:0);
  } else {
    move(dy>0?3:1);
  }
}, {passive:true});

document.getElementById('restart').addEventListener('click', newGrid);
document.getElementById('overRestart').addEventListener('click', newGrid);
window.addEventListener('resize', render);

newGrid();
</script>
</body>
</html>
